services:
  backend:
    image: ghcr.io/slmingol/crossword-catastrophe-backend:latest
    ports:
      - "9999:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_PATH: /app/data/crossword.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  scraper:
    image: ghcr.io/slmingol/crossword-catastrophe-scraper:latest
    environment:
      DATABASE_PATH: /app/data/crossword.db
      SCRAPE_SCHEDULE: "0 6 * * *"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/slmingol/crossword-catastrophe-frontend:latest
    ports:
      - "9998:3000"
    environment:
      VITE_API_URL: http://localhost:9999/api
    restart: unless-stopped
