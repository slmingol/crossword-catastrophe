version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crossword
      POSTGRES_USER: crossword
      POSTGRES_PASSWORD: crossword_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crossword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://crossword:crossword_dev@postgres:5432/crossword
      NODE_ENV: development
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/backend:/app/packages/backend
      - /app/packages/backend/node_modules
      - puzzle_data:/app/data

  scraper:
    build:
      context: .
      dockerfile: packages/scraper/Dockerfile
    environment:
      DATABASE_URL: postgresql://crossword:crossword_dev@postgres:5432/crossword
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - puzzle_data:/app/data

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./packages/frontend:/app/packages/frontend
      - /app/packages/frontend/node_modules

volumes:
  postgres_data:
  puzzle_data:
